<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify-web page:Music for everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>
<body>
    <div class="head flex items">
        <header class="flex items">
            <div class="logo flex"><img src="logo.svg" alt="Spotify"></div>
            <div class="home flex"><img src="home.svg" alt="Home"></div>
            <div class="search flex justify items"><img src="search.svg" alt="search">
            <input type="text" name="search" id="seach" placeholder="What do you want to play?">
            <img src="folder.svg" alt="folder">
            </div>
            <div class="install"><img src="install.svg" alt="install"></div>
            <div class="notifi"><img src="notifi.svg" alt="notification"></div>
            <div class="add"><img src="pub.svg" alt="add people"></div>
            <div class="profile"></div>
        </header>
    </div>
    <div class="containor flex">
        <div class="left"></div>
        <div class="mid"></div>
        <div class="right"></div>
    </div>
</body>
</html>
