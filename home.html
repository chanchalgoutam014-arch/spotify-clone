<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Web page : Music for everyone</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
</head>

<body>
    <header class="header flex items">
        <div class="leftside flex items">
            <div class="logo flex items"><img src="logo.svg" alt="Spotify" /></div>
            <button class="home">
                <div><img src="home.svg" alt="Home" /></div>
            </button>
        </div>
        <div class="search flex items">
            <img src="search.svg" alt="search" />
            <input class="write" type="text" name="search" id="search" placeholder="What do you want to play?" />
            <button class="folder">
                <img src="folder.svg" alt="folder" />
            </button>
        </div>
        <div class="options flex items">
            <button>Premium</button>
            <button>Support</button>
            <button>Download</button>
        </div>
        <div class="rightside flex items">
            <div class="install flex">
                <button class="int flex items">
                    <img style="opacity: 70%;" src="install.svg" alt="install" />Install App
                </button>
                <button>Sign up</button>
            </div>
            <div class="log flex items">
                <button>Log in</button>
            </div>
        </div>
    </header>
    <div class="containor flex">
        <div class="left"></div>
        <div class="mid"></div>
    </div>
</body>

</html>
